name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Check formatting
        run: |
          gofmt -l . | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out || (echo "Files need formatting:" && cat /tmp/gofmt.out && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-go1.26

      - name: Install golangci-lint
        run: test -f ~/go/bin/golangci-lint || go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: golangci-lint
        run: ~/go/bin/golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Test
        run: go test -race -count=1 ./...
